<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPrice AI | Real Estate</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            /* Using a high-quality background image */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; background-position: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px; width: 90%; max-width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: white; text-align: center;
        }
        .input-box { position: relative; margin-bottom: 15px; }
        input, select {
            width: 100%; padding: 12px 12px 12px 45px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1); color: white;
            box-sizing: border-box; font-size: 14px; outline: none;
        }
        select option { background: #333; color: white; }
        .input-box i { position: absolute; left: 15px; top: 15px; color: #4e73df; z-index: 1; }
        .btn-main {
            width: 100%; padding: 14px; border-radius: 10px; border: none;
            background: #4e73df; color: white; font-weight: bold; 
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-main:hover { background: #2e59d9; transform: translateY(-2px); }
        .result-box {
            margin-top: 20px; padding: 15px; border-radius: 10px;
            background: rgba(28, 200, 138, 0.2); border: 1px solid #1cc88a;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2><i class="fas fa-home"></i> SmartPrice AI</h2>
        <p>Advanced Real Estate Valuation</p>
        
        <form action="/predict" method="post">
            <div class="input-box"><i class="fas fa-ruler-combined"></i><input type="number" name="sqft" placeholder="Total Area (Sq Ft)" required></div>
            <div class="input-box"><i class="fas fa-bed"></i><input type="number" name="beds" placeholder="No. of Bedrooms" required></div>
            
            <div class="input-box">
                <i class="fas fa-map-marker-alt"></i>
                <select name="location">
                    <option value="jabalpur">Jabalpur</option>
                    <option value="gujarat">Gujarat</option>
                    <option value="other">Other City</option>
                </select>
            </div>

            <div class="input-box">
                <i class="fas fa-city"></i>
                <select name="area_type">
                    <option value="city">City Area</option>
                    <option value="village">Village Area</option>
                </select>
            </div>

            <button type="submit" class="btn-main">Calculate Valuation</button>
        </form>

        {% if prediction_text %}<div class="result-box">{{ prediction_text }}</div>{% endif %}
    </div>
</body>
</html>
