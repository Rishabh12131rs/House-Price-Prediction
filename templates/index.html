<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bharat Estate AI | No-Refresh Predictor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 1000px; display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; }
        .card { background: rgba(30, 41, 59, 0.8); padding: 25px; border-radius: 20px; border: 1px solid #334155; }
        .search-container { position: relative; margin-bottom: 15px; display: flex; gap: 10px; }
        #city-search { flex-grow: 1; padding: 12px; border-radius: 8px; border: 1px solid #4e73df; background: #1e293b; color: white; }
        #map { height: 400px; border-radius: 15px; border: 2px solid #334155; }
        .input-group { margin-bottom: 12px; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
        .btn-predict { width: 100%; padding: 15px; background: #10b981; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        .result-box { display: none; margin-top: 15px; padding: 15px; background: rgba(78, 115, 223, 0.2); border: 1px solid #4e73df; border-radius: 10px; text-align: center; font-size: 22px; font-weight: bold; color: #fff; }
        .loading { display: none; color: #4e73df; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2><i class="fas fa-robot"></i> Price Predictor</h2>
            <form id="predictionForm">
                <div class="input-group"><input type="number" name="sqft" placeholder="Total Area (Sq Ft)" required></div>
                <div class="input-group"><input type="number" name="beds" placeholder="Bedrooms" required></div>
                <div class="input-group"><input type="number" name="baths" placeholder="Bathrooms" required></div>
                <div class="input-group">
                    <select name="prop_type">
                        <option value="0">Apartment / Flat</option>
                        <option value="1">Independent House</option>
                        <option value="2">Luxury Villa</option>
                    </select>
                </div>
                <div class="input-group">
                    <select name="furnish">
                        <option value="0">Unfurnished</option>
                        <option value="1">Semi-Furnished</option>
                        <option value="2">Fully Furnished</option>
                    </select>
                </div>
                <div class="input-group">
                    <label style="font-size: 13px;"><input type="checkbox" name="amenities"> Modern Amenities</label>
                </div>
                <button type="submit" class="btn-predict">Calculate Valuation</button>
            </form>
            
            <div id="loading" class="loading"><i class="fas fa-spinner fa-spin"></i> Analyzing Market...</div>
            <div id="result" class="result-box"></div>
        </div>

        <div class="card">
            <h3><i class="fas fa-map-marker-alt"></i> Locate Property</h3>
            <div class="search-container">
                <input type="text" id="city-search" placeholder="Search City...">
                <button style="background:#4e73df; color:white; border:none; padding:10px; border-radius:8px;" onclick="searchCity()">Search</button>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // MAP LOGIC
        var map = L.map('map').setView([22.9734, 78.6569], 5); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker;

        function searchCity() {
            var city = document.getElementById('city-search').value;
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}`)
                .then(res => res.json()).then(data => {
                    if(data.length > 0) map.flyTo([data[0].lat, data[0].lon], 14);
                });
        }

        map.on('click', function(e) {
            if(marker) map.removeLayer(marker);
            marker = L.marker(e.latlng).addTo(map);
        });

        // PREDICTION LOGIC (AJAX - NO REFRESH)
        document.getElementById('predictionForm').onsubmit = async (e) => {
            e.preventDefault(); // This stops the page from refreshing!
            
            const formData = new FormData(e.target);
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';

            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });

            const resultText = await response.text();
            // We extract the result from the returned HTML or change backend to JSON
            // For now, let's update the backend to return just the text for simpler logic
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result').innerHTML = resultText;
            document.getElementById('result').style.display = 'block';
        };
    </script>
</body>
</html>
