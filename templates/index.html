<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat Estate AI | Smart City Predictor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
        .container { width: 100%; max-width: 1100px; display: grid; grid-template-columns: 1fr 1.3fr; gap: 25px; align-items: start; }
        .card { background: rgba(30, 41, 59, 0.9); padding: 30px; border-radius: 24px; border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        
        /* Map Search Styling */
        .search-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        #city-input { flex-grow: 1; padding: 12px; border-radius: 10px; border: 1px solid #4e73df; background: #1e293b; color: white; outline: none; }
        .search-btn { background: #4e73df; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .search-btn:hover { background: #2e59d9; }

        #map { height: 450px; border-radius: 18px; border: 2px solid #334155; }
        
        /* Form Styling */
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #94a3b8; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
        
        .btn-predict { width: 100%; padding: 16px; background: #10b981; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .btn-predict:hover { background: #059669; transform: scale(1.02); }

        /* Result & Loading */
        #result-display { display: none; margin-top: 20px; padding: 20px; border-radius: 12px; background: rgba(78, 115, 223, 0.2); border: 1px solid #4e73df; text-align: center; font-size: 20px; font-weight: bold; line-height: 1.5; }
        .loader { display: none; margin-top: 15px; color: #4e73df; font-weight: bold; }
        
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2><i class="fas fa-microchip"></i> Smart Price AI</h2>
            <p style="color: #94a3b8; font-size: 14px;">Fill details and select location on map</p>
            
            <form id="aiForm">
                <div class="input-group"><input type="number" name="sqft" placeholder="Total Sq Ft (e.g. 1200)" required></div>
                <div class="input-group"><input type="number" name="beds" placeholder="Bedrooms" required></div>
                <div class="input-group"><input type="number" name="baths" placeholder="Bathrooms" required></div>
                
                <div class="input-group">
                    <select name="prop_type">
                        <option value="0">Flat / Apartment</option>
                        <option value="1">Independent House</option>
                        <option value="2">Luxury Villa</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <select name="furnish">
                        <option value="0">Unfurnished</option>
                        <option value="1">Semi-Furnished</option>
                        <option value="2">Fully Furnished</option>
                    </select>
                </div>

                <div class="input-group" style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" name="amenities" style="width: auto;"> 
                    <span style="font-size: 13px;">Premium Amenities (Gym/Pool)</span>
                </div>

                <input type="hidden" id="lat" name="lat">
                <input type="hidden" id="lng" name="lng">

                <button type="submit" class="btn-predict">Calculate Market Price</button>
            </form>

            <div id="loader" class="loader"><i class="fas fa-circle-notch fa-spin"></i> Detecting City & Calculating...</div>
            <div id="result-display"></div>
        </div>

        <div class="card">
            <div class="search-bar">
                <input type="text" id="city-input" placeholder="Search City (e.g. Jabalpur, Indore)">
                <button class="search-btn" onclick="goToCity()"><i class="fas fa-search-location"></i> Search</button>
            </div>
            <div id="map"></div>
            <p style="font-size: 12px; color: #94a3b8; margin-top: 10px;">
                <i class="fas fa-info-circle"></i> Click exactly where the property is located to get a localized price.
            </p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize Map
        var map = L.map('map').setView([22.9734, 78.6569], 5); // India Center
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker;

        // 2. Search City Function
        function goToCity() {
            var city = document.getElementById('city-input').value;
            if(!city) return alert("Please enter a city name");
            
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}`)
                .then(res => res.json()).then(data => {
                    if(data.length > 0) map.flyTo([data[0].lat, data[0].lon], 14);
                    else alert("City not found!");
                });
        }

        // 3. Map Click Event (Update Lat/Lng)
        map.on('click', function(e) {
            if(marker) map.removeLayer(marker);
            marker = L.marker(e.latlng).addTo(map);
            
            document.getElementById('lat').value = e.latlng.lat;
            document.getElementById('lng').value = e.latlng.lng;
        });

        // 4. Submit Form using AJAX (No Refresh)
        document.getElementById('aiForm').onsubmit = async (e) => {
            e.preventDefault();
            
            // Check if user selected a location
            if(!document.getElementById('lat').value) {
                return alert("Please click a location on the map first!");
            }

            const formData = new FormData(e.target);
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('result-display');

            loader.style.display = 'block';
            resultBox.style.display = 'none';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                const finalResult = await response.text();
                
                loader.style.display = 'none';
                resultBox.innerHTML = finalResult;
                resultBox.style.display = 'block';
            } catch (err) {
                loader.style.display = 'none';
                alert("Error connecting to server.");
            }
        };
    </script>
</body>
</html>
