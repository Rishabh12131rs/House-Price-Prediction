<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Real Estate Predictor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; background-position: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px; width: 100%; max-width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: white; text-align: center;
        }
        .input-box {
            position: relative; margin-bottom: 15px; text-align: left;
        }
        input {
            width: 100%; padding: 12px 40px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1); color: white;
            box-sizing: border-box; font-size: 14px;
        }
        input::placeholder { color: #ccc; }
        .input-box i { position: absolute; left: 15px; top: 15px; color: #4e73df; }
        button {
            width: 100%; padding: 14px; border-radius: 10px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-main { background: #4e73df; color: white; }
        .btn-sub { background: rgba(255,255,255,0.2); color: white; margin-top: 15px; }
        .result-box {
            margin-top: 20px; padding: 15px; border-radius: 10px;
            background: rgba(28, 200, 138, 0.2); border: 1px solid #1cc88a;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2><i class="fas fa-chart-line"></i> SmartPrice AI</h2>
        <p>Advanced Real Estate Valuation</p>
        
        <form action="/predict" method="post">
            <div class="input-box"><i class="fas fa-vector-square"></i><input type="number" name="sqft" placeholder="Total Area (Sq Ft)" required></div>
            <div class="input-box"><i class="fas fa-bed"></i><input type="number" name="beds" placeholder="No. of Bedrooms" required></div>
            <div class="input-box"><i class="fas fa-bath"></i><input type="number" name="baths" placeholder="No. of Bathrooms" required></div>
            <div class="input-box"><i class="fas fa-history"></i><input type="number" name="age" placeholder="Age of House (Years)" required></div>
            <div class="input-box"><i class="fas fa-car"></i><input type="number" name="parking" placeholder="Parking Spaces" required></div>
            <button type="submit" class="btn-main">Calculate Market Value</button>
        </form>

        {% if prediction_text %}<div class="result-box">{{ prediction_text }}</div>{% endif %}

        <form action="/visualize" method="get">
            <button type="submit" class="btn-sub"><i class="fas fa-eye"></i> View Trend Analysis</button>
        </form>

        {% if plot_url %}
            <img src="data:image/png;base64,{{ plot_url }}" style="width:100%; border-radius:10px; margin-top:15px;">
        {% endif %}
    </div>
</body>
</html>
