<form action="/predict" method="post">
    <div class="input-box"><i class="fas fa-ruler"></i><input type="number" name="sqft" placeholder="Sq Ft" required></div>
    <div class="input-box"><i class="fas fa-bed"></i><input type="number" name="beds" placeholder="Bedrooms" required></div>
    
    <div class="input-box">
        <i class="fas fa-map-marker-alt"></i>
        <select name="location" style="width:100%; padding:12px 40px; border-radius:10px; background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.3);">
            <option value="jabalpur">Jabalpur</option>
            <option value="gujarat">Gujarat</option>
            <option value="other">Other City</option>
        </select>
    </div>

    <div class="input-box">
        <i class="fas fa-city"></i>
        <select name="area_type" style="width:100%; padding:12px 40px; border-radius:10px; background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.3);">
            <option value="city">City Area</option>
            <option value="village">Village Area</option>
        </select>
    </div>

    <button type="submit" class="btn-main">Calculate Valuation</button>
</form>
