<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bharat Estate AI | Price Predictor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: rgba(30, 41, 59, 0.7); padding: 30px; border-radius: 20px; border: 1px solid #334155; }
        #map { height: 300px; border-radius: 15px; margin-bottom: 15px; border: 2px solid #4e73df; }
        .input-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; }
        .btn { width: 100%; padding: 15px; background: #4e73df; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; background: rgba(16, 185, 129, 0.2); border: 1px solid #10b981; border-radius: 10px; text-align: center; font-size: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2><i class="fas fa-indian-rupee-sign"></i> Predict Price</h2>
            <form action="/predict" method="post">
                <div class="input-group"><input type="number" name="sqft" placeholder="Area (Sq Ft)" required></div>
                <div class="input-group"><input type="number" name="beds" placeholder="Bedrooms" required></div>
                <div class="input-group"><input type="number" name="baths" placeholder="Bathrooms" required></div>
                <div class="input-group">
                    <select name="prop_type">
                        <option value="0">Apartment / Flat</option>
                        <option value="1">Independent House</option>
                        <option value="2">Luxury Villa</option>
                    </select>
                </div>
                <div class="input-group">
                    <select name="furnish">
                        <option value="0">Unfurnished</option>
                        <option value="1">Semi-Furnished</option>
                        <option value="2">Fully Furnished</option>
                    </select>
                </div>
                <div class="input-group">
                    <label><input type="checkbox" name="amenities" value="1"> Includes Modern Amenities (Gym/Pool)</label>
                </div>
                <input type="hidden" id="lat" name="lat"><input type="hidden" id="lng" name="lng">
                <button type="submit" class="btn">Get Valuation</button>
            </form>
            {% if prediction_text %}<div class="result">{{ prediction_text }}</div>{% endif %}
        </div>

        <div class="card">
            <h3><i class="fas fa-map-marked-alt"></i> Select Location</h3>
            <div id="map"></div>
            <p style="font-size: 12px; color: #94a3b8;">Click on the map to pin your house location. This helps our AI analyze the area premium.</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([23.1815, 79.9864], 13); // Default to Jabalpur
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker;
        map.on('click', function(e) {
            if(marker) map.removeLayer(marker);
            marker = L.marker(e.latlng).addTo(map);
            document.getElementById('lat').value = e.latlng.lat;
            document.getElementById('lng').value = e.latlng.lng;
        });
    </script>
</body>
</html>
